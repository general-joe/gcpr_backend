<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Successful</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,

        line-height: 1.6;
        color: #333333;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
      }
      .header {
        font-size: 18px;

        margin-bottom: 30px;

      }
      .content {

      }
      .success-message {
        display: inline-block;
        padding: 12px 24px;
        background-color: #28a745;
        color: #ffffff;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 500;
        margin: 20px 0;
        font-size: 20px;
        letter-spacing: 1px;
      }
      .footer {
        font-size: 12px;
        color: #777;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }

      <div class="header">gmnc</div>
      <div class="content">
        <p>Hello,</p>
        <p>{{message}}</p>

        <div class="success-message" style="
          display: inline-block;
          padding: 12px 24px;
          background-color: #414141;
          color: #ffffff;
          text-decoration: none;
          border-radius: 4px;
          font-weight: 500;
          margin: 20px 0;
          font-size: 20px;
